<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Game</title>
    <!-- Importing 8-Bit Pixel Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020617;
            --card-blue: #1e3a8a;
            --card-hover: #1d4ed8;
            --accent-amber: #eab308;
            --pixel-green: #22c55e;
            --pixel-red: #ef4444;
            --text-light: #f8fafc;
            --font-pixel: 'Press Start 2P', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-light); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            font-family: var(--font-pixel);
            font-size: 12px;
            image-rendering: pixelated;
        }
        
        /* Title Layout */
        .title-container {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { 
            color: var(--accent-amber); 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            font-size: 2.2rem;
            line-height: 1.4;
            text-shadow: 4px 4px 0px #7e22ce, 8px 8px 0px #000;
        }
        
        /* Scoreboard */
        .scoreboard { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .team-card { 
            background: #0f172a; 
            padding: 15px; 
            border: 4px solid #334155;
            box-shadow: 4px 4px 0px #000;
            text-align: center; 
            min-width: 190px;
        }
        .team-name { 
            font-size: 0.7rem; 
            margin-bottom: 12px; 
            color: #94a3b8; 
            text-transform: uppercase;
            outline: none;
            letter-spacing: 1px;
        }
        .team-name:focus {
            border-bottom: 2px dashed var(--accent-amber);
        }
        .score { 
            font-size: 1.8rem; 
            color: #38bdf8; 
            margin-bottom: 15px; 
            text-shadow: 3px 3px 0px #000;
        }
        .score-control-group { display: flex; gap: 8px; justify-content: center; }
        
        /* 3D Flat Styled Retro Buttons */
        .pixel-btn {
            font-family: var(--font-pixel);
            font-size: 0.65rem;
            border: none;
            padding: 8px 10px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            box-shadow: 0px 4px 0px #000;
            position: relative;
            transition: all 0.1s ease;
        }
        .pixel-btn.plus { background: var(--pixel-green); box-shadow: 0px 4px 0px #15803d, 0px 4px 0px #000; }
        .pixel-btn.minus { background: var(--pixel-red); box-shadow: 0px 4px 0px #b91c1c, 0px 4px 0px #000; }
        .pixel-btn.control { background: #6b21a8; box-shadow: 0px 4px 0px #4c1d95, 0px 4px 0px #000; font-size: 0.75rem; padding: 10px 20px; margin-top: 10px; }
        .pixel-btn.control:hover { background: #7e22ce; }
        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000;
        }

        /* Game Board Grid Architecture */
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .category-header { 
            background: #1e1b4b; 
            padding: 15px 5px; 
            text-align: center; 
            font-size: 0.65rem;
            line-height: 1.5;
            text-transform: uppercase; 
            border: 4px solid #4338ca;
            box-shadow: 4px 4px 0px #000;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 75px;
            color: #c084fc;
        }
        .clue-card { 
            background: var(--card-blue); 
            color: var(--accent-amber); 
            font-size: 1.6rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 4px solid #2563eb;
            box-shadow: 4px 4px 0px #000;
            cursor: pointer; 
            min-height: 100px;
            text-shadow: 3px 3px 0px #000;
        }
        .clue-card:hover:not(.viewed) { 
            background: var(--card-hover); 
            border-color: #60a5fa;
            color: var(--text-light);
        }
        .clue-card.viewed { 
            background: #0f172a; 
            color: #475569; 
            border-color: #1e293b; 
            cursor: not-allowed; 
            box-shadow: none;
            text-shadow: none;
        }

        /* Retro Modals Framework Overlay Layout */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .modal-content { 
            background: #020617; 
            border: 6px solid var(--accent-amber); 
            padding: 40px; 
            max-width: 750px; 
            width: 100%; 
            text-align: center; 
            position: relative; 
            box-shadow: 10px 10px 0px #000;
        }
        .modal-text { font-size: 1rem; line-height: 1.8; margin-bottom: 40px; color: var(--text-light); font-family: var(--font-pixel); text-transform: uppercase; }
        
        .action-btn { 
            background: #a855f7; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            font-size: 0.8rem; 
            font-family: var(--font-pixel);
            text-transform: uppercase;
            cursor: pointer; 
            box-shadow: 0px 5px 0px #6b21a8, 0px 5px 0px #000;
        }
        .action-btn:hover { background: #c084fc; }
        .action-btn:active { transform: translateY(5px); box-shadow: 0px 0px 0px #000; }
        
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #ef4444; }

        /* Pop-up Teacher Control Dashboard Panel Styling */
        #teacherModal .modal-content {
            max-width: 1100px;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
            border-color: #a855f7;
        }
        .panel-heading {
            color: #c084fc;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border-bottom: 4px dashed #334155;
            padding-bottom: 12px;
        }
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .panel-col {
            background: #0f172a;
            padding: 12px;
            border: 2px solid #334155;
        }
        .panel-cat-input {
            width: 100%;
            background: #1e1b4b;
            border: 2px solid var(--accent-amber);
            color: white;
            padding: 8px;
            font-family: var(--font-pixel);
            font-size: 0.55rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .clue-edit-box {
            background: #020617;
            padding: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #3b82f6;
        }
        .clue-label {
            color: #3b82f6;
            font-size: 0.55rem;
            margin-bottom: 4px;
        }
        .panel-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 6px;
            font-family: var(--font-sans); /* Kept standard typography for easy long question writing */
            font-size: 0.8rem;
            margin-top: 4px;
            display: block;
        }
        .panel-input:focus { outline: none; border-color: var(--accent-amber); }
        .panel-save-container { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>Jeopardy Game</h1>
        <!-- Config Launcher Trigger Button under Title Header -->
        <button class="pixel-btn control" onclick="openTeacherPanel()">[ EDIT QUESTS ]</button>
    </div>

    <!-- Scoreboard System -->
    <div class="scoreboard">
        <div class="team-card">
            <div class="team-name" contenteditable="true">Player 1</div>
            <div class="score" id="s1">000</div>
            <div class="score-control-group">
                <button class="pixel-btn plus" onclick="changeScore('s1', 100)">+UP</button>
                <button class="pixel-btn minus" onclick="changeScore('s1', -100)">-DN</button>
            </div>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Player 2</div>
            <div class="score" id="s2">000</div>
            <div class="score-control-group">
                <button class="pixel-btn plus" onclick="changeScore('s2', 100)">+UP</button>
                <button class="pixel-btn minus" onclick="changeScore('s2', -100)">-DN</button>
            </div>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Player 3</div>
            <div class="score" id="s3">000</div>
            <div class="score-control-group">
                <button class="pixel-btn plus" onclick="changeScore('s3', 100)">+UP</button>
                <button class="pixel-btn minus" onclick="changeScore('s3', -100)">-DN</button>
            </div>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Player 4</div>
            <div class="score" id="s4">000</div>
            <div class="score-control-group">
                <button class="pixel-btn plus" onclick="changeScore('s4', 100)">+UP</button>
                <button class="pixel-btn minus" onclick="changeScore('s4', -100)">-DN</button>
            </div>
        </div>
    </div>

    <!-- Active Visual Game Grid -->
    <div class="board" id="gameBoard"></div>

    <!-- Popout Clue Window Modal -->
    <div class="modal" id="clueModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-text" id="modalText">Initializing data...</div>
            <button class="action-btn" id="revealBtn" onclick="revealAnswer()">Show Solution</button>
        </div>
    </div>

    <!-- Popout Teacher Configuration Dashboard Panel Modal -->
    <div class="modal" id="teacherModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeTeacherPanel()">&times;</span>
            <div class="panel-heading">🛠️ Teacher Control Panel [Live Editor]</div>
            
            <div id="panelFormGroup" class="panel-grid">
                <!-- Programmatic loops map input clusters here instantly -->
            </div>

            <div class="panel-save-container">
                <button class="action-btn" onclick="saveConfigData()">Compile & Rebuild Grid</button>
            </div>
        </div>
    </div>

    <script>
        // Internal Global Content Storage Template Block
        let gameData = [
            {
                category: "Algebra",
                clues: [
                    { value: 100, q: "SOLVE FOR X: 2X + 5 = 15", a: "ANSWER: X = 5" },
                    { value: 200, q: "WHAT IS THE SLOPE OF THE LINE Y = -3X + 7?", a: "ANSWER: -3" },
                    { value: 300, q: "FACTOR COMPLETELY: X² - 9", a: "ANSWER: (X + 3)(X - 3)" },
                    { value: 400, q: "SOLVE FOR Y: 3(Y - 2) = 12", a: "ANSWER: Y = 6" }
                ]
            },
            {
                category: "Geometry",
                clues: [
                    { value: 100, q: "HOW MANY DEGREES ARE IN A STRAIGHT ANGLE?", a: "ANSWER: 180 DEGREES" },
                    { value: 200, q: "FIND THE AREA OF A TRIANGLE WITH BASE 6CM AND HEIGHT 4CM.", a: "ANSWER: 12 CM²" },
                    { value: 300, q: "WHAT IS THE GEOMETRIC TERM FOR A REGULAR 8-SIDED POLYGON?", a: "ANSWER: OCTAGON" },
                    { value: 400, q: "STATE THE PYTHAGOREAN THEOREM FORMULA.", a: "ANSWER: A² + B² = C²" }
                ]
            },
            {
                category: "Fractions",
                clues: [
                    { value: 100, q: "SIMPLIFY THE FRACTION 8/12 TO ITS LOWEST TERMS.", a: "ANSWER: 2/3" },
                    { value: 200, q: "WHAT IS 3/4 MULTIPLIED BY 2/3?", a: "ANSWER: 6/12 OR 1/2" },
                    { value: 300, q: "CONVERT 2.75 INTO A MIXED FRACTION.", a: "ANSWER: 2 3/4" },
                    { value: 400, q: "WHICH FRACTION IS LARGER: 5/8 OR 7/12?", a: "ANSWER: 5/8" }
                ]
            },
            {
                category: "Problems",
                clues: [
                    { value: 100, q: "SAM BOUGHT 4 NOTEBOOKS FOR $3 EACH. PAID WITH $20. FIND CHANGE.", a: "ANSWER: $8" },
                    { value: 200, q: "A TRAIN TRAVELS AT 60 MPH. HOW LONG TO GO 210 MILES?", a: "ANSWER: 3.5 HOURS" },
                    { value: 300, q: "SUM OF THREE CONSECUTIVE INTEGERS IS 45. FIND SMALLEST.", a: "ANSWER: 14" },
                    { value: 400, q: "A SHOE STORE OFFERS A 20% DISCOUNT ON A $80 PAIR. SALE PRICE?", a: "ANSWER: $64" }
                ]
            }
        ];

        let currentAnswer = "";

        // Build active gaming matrix configuration setup
        function initBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = "";
            
            // Layout Category Headings Rows
            gameData.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = cat.category;
                board.appendChild(header);
            });

            // Map and assemble sequential point cards
            const numRows = gameData[0].clues.length;
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < gameData.length; c++) {
                    const clue = gameData[c].clues[r];
                    const card = document.createElement('div');
                    card.className = 'clue-card';
                    card.innerText = `${clue.value}`;
                    card.onclick = function() {
                        if (!card.classList.contains('viewed')) {
                            card.classList.add('viewed');
                            showClue(clue.q, clue.a);
                        }
                    };
                    board.appendChild(card);
                }
            }
        }

        function showClue(question, answer) {
            currentAnswer = answer;
            document.getElementById('modalText').innerText = question;
            document.getElementById('revealBtn').style.display = 'inline-block';
            document.getElementById('clueModal').style.display = 'flex';
        }

        function revealAnswer() {
            document.getElementById('modalText').innerText = currentAnswer;
            document.getElementById('revealBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('clueModal').style.display = 'none';
        }

        function changeScore(id, amt) {
            const scoreEl = document.getElementById(id);
            let currentScore = parseInt(scoreEl.innerText);
            let newScore = currentScore + amt;
            // Pad display zeros for authentic arcade styling score counters
            scoreEl.innerText = newScore < 0 ? newScore : String(newScore).padStart(3, '0');
        }

        // Configuration Panel Open / Close controls
        function openTeacherPanel() {
            buildTeacherPanelInputs();
            document.getElementById('teacherModal').style.display = 'flex';
        }

        function closeTeacherPanel() {
            document.getElementById('teacherModal').style.display = 'none';
        }

        // Render input structure fields inside the pop-up modal dashboard
        function buildTeacherPanelInputs() {
            const container = document.getElementById('panelFormGroup');
            container.innerHTML = "";
            
            gameData.forEach((catObj, catIdx) => {
                const colNode = document.createElement('div');
                colNode.className = 'panel-col';
                
                colNode.innerHTML = `
                    <input type="text" class="panel-cat-input" id="cfg-cat-${catIdx}" value="${catObj.category}">
                `;
                
                catObj.clues.forEach((clueObj, clueIdx) => {
                    const editBlock = document.createElement('div');
                    editBlock.className = 'clue-edit-box';
                    editBlock.innerHTML = `
                        <div class="clue-label">CLUE $${clueObj.value}</div>
                        <input type="text" class="panel-input" id="cfg-q-${catIdx}-${clueIdx}" value="${clueObj.q.replace(/"/g, '&quot;')}">
                        <input type="text" class="panel-input" id="cfg-a-${catIdx}-${clueIdx}" value="${clueObj.a.replace(/"/g, '&quot;')}">
                    `;
                    colNode.appendChild(editBlock);
                });
                
                container.appendChild(colNode);
            });
        }

        // Pull active parameters out from form text entries, parse mapping configurations, updates layout grid redraws
        function saveConfigData() {
            gameData.forEach((catObj, catIdx) => {
                const newCatName = document.getElementById(`cfg-cat-${catIdx}`).value;
                if(newCatName.trim() !== "") {
                    catObj.category = newCatName;
                }
                
                catObj.clues.forEach((clueObj, clueIdx) => {
                    clueObj.q = document.getElementById(`cfg-q-${catIdx}-${clueIdx}`).value;
                    clueObj.a = document.getElementById(`cfg-a-${catIdx}-${clueIdx}`).value;
                });
            });
            
            initBoard();
            closeTeacherPanel();
        }

        window.onload = function() {
            initBoard();
        };
    </script>
</body>
</html>
