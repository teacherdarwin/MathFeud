<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Jeopardy Game</title>
    <!-- Importing Bebas Neue from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-blue: #1e3a8a;
            --card-hover: #2563eb;
            --accent-amber: #f59e0b;
            --text-light: #f8fafc;
            --font-display: 'Bebas Neue', sans-serif;
            --font-sans: 'Inter', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-light); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            font-family: var(--font-sans);
            padding-bottom: 80px; /* Space for configuration button */
        }
        
        h1 { 
            text-align: center; 
            color: var(--accent-amber); 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-family: var(--font-display);
            font-size: 4rem;
            text-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }
        
        /* Scoreboard */
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .team-card { 
            background: #1e293b; 
            padding: 15px 25px; 
            border-radius: 16px; 
            border: 2px solid #334155; 
            text-align: center; 
            min-width: 170px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .team-name { 
            font-size: 1.1rem; 
            font-weight: 800; 
            margin-bottom: 8px; 
            color: #94a3b8; 
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }
        .team-name:focus {
            border-bottom: 2px dashed var(--accent-amber);
        }
        .score { 
            font-family: var(--font-display);
            font-size: 3.5rem; 
            color: var(--text-light); 
            margin-bottom: 12px; 
            letter-spacing: 1px;
            line-height: 1;
        }
        .score-control-group {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .score-btn { 
            border: none; 
            padding: 8px 14px; 
            font-weight: 800; 
            font-size: 0.9rem;
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .plus { background: #10b981; color: white; }
        .minus { background: #ef4444; color: white; }
        .score-btn:hover { 
            transform: translateY(-2px);
            filter: brightness(1.15);
            box-shadow: 0 6px 8px -1px rgba(0, 0, 0, 0.3);
        }

        /* Game Board Grid */
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex-grow: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .category-header { 
            background: #334155; 
            padding: 15px 10px; 
            text-align: center; 
            font-family: var(--font-display);
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase; 
            border-radius: 12px; 
            border-bottom: 5px solid var(--accent-amber); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 70px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .clue-card { 
            background: linear-gradient(135deg, var(--card-blue), #1e40af); 
            color: var(--accent-amber); 
            font-family: var(--font-display);
            font-size: 3rem; 
            letter-spacing: 1px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            min-height: 100px; 
            border: 2px solid #2563eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .clue-card:hover:not(.viewed) { 
            background: linear-gradient(135deg, var(--card-hover), #3b82f6); 
            transform: translateY(-4px) scale(1.02); 
            color: var(--text-light); 
            border-color: #60a5fa;
            box-shadow: 0 12px 20px -5px rgba(37, 99, 235, 0.5);
        }
        .clue-card.viewed { 
            background: #1e293b; 
            color: #475569; 
            border-color: #334155; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        /* Generic Modals Framework */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .modal-content { 
            background: #1e293b; 
            border: 3px solid var(--accent-amber); 
            padding: 50px 40px; 
            border-radius: 24px; 
            max-width: 750px; 
            width: 100%; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); 
        }
        .modal-text { font-size: 2.2rem; line-height: 1.4; margin-bottom: 40px; font-weight: 600; color: var(--text-light); }
        
        /* Action Buttons */
        .action-btn { 
            background: var(--accent-amber); 
            color: #0f172a; 
            border: none; 
            padding: 16px 36px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
        }
        .action-btn:hover { 
            background: #fbbf24; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
        }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: #94a3b8; transition: color 0.2s; line-height: 1; }
        .close-btn:hover { color: white; }

        /* Floating Settings Launcher */
        .config-launcher {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #334155;
            color: var(--text-light);
            border: 2px solid #475569;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 90;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .config-launcher:hover {
            background: #475569;
            border-color: var(--accent-amber);
            color: var(--accent-amber);
            transform: scale(1.05);
        }

        /* Teacher Dashboard Panel Layout */
        #configModal .modal-content {
            max-width: 1000px;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
            padding: 30px;
        }
        #configModal h2 {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-amber);
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }
        .panel-columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .panel-column {
            background: #111827;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .column-title-input {
            width: 100%;
            background: #1f2937;
            border: 2px solid var(--accent-amber);
            color: white;
            font-weight: 800;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .clue-edit-block {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid #3b82f6;
        }
        .clue-val-label {
            font-family: var(--font-display);
            color: #3b82f6;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .panel-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 4px;
            display: block;
        }
        .panel-input:focus {
            outline: none;
            border-color: var(--accent-amber);
        }
        .panel-input::placeholder { color: #64748b; }
        .save-footer { text-align: center; }
    </style>
</head>
<body>

    <h1>Classroom Jeopardy</h1>

    <!-- Scoreboard Dashboard -->
    <div class="scoreboard">
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 1</div>
            <div class="score" id="s1">0</div>
            <div class="score-control-group">
                <button class="score-btn plus" onclick="changeScore('s1', 100)">+100</button>
                <button class="score-btn minus" onclick="changeScore('s1', -100)">-100</button>
            </div>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 2</div>
            <div class="score" id="s2">0</div>
            <div class="score-control-group">
                <button class="score-btn plus" onclick="changeScore('s2', 100)">+100</button>
                <button class="score-btn minus" onclick="changeScore('s2', -100)">-100</button>
            </div>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 3</div>
            <div class="score" id="s3">0</div>
            <div class="score-control-group">
                <button class="score-btn plus" onclick="changeScore('s3', 100)">+100</button>
                <button class="score-btn minus" onclick="changeScore('s3', -100)">-100</button>
            </div>
        </div>
        <div class="team-card">
            <div class="team-name" contenteditable="true">Team 4</div>
            <div class="score" id="s4">0</div>
            <div class="score-control-group">
                <button class="score-btn plus" onclick="changeScore('s4', 100)">+100</button>
                <button class="score-btn minus" onclick="changeScore('s4', -100)">-100</button>
            </div>
        </div>
    </div>

    <!-- Active Grid Board -->
    <div class="board" id="gameBoard"></div>

    <!-- Live Clue Viewer Modal -->
    <div class="modal" id="clueModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-text" id="modalText">Clue text goes here...</div>
            <button class="action-btn" id="revealBtn" onclick="revealAnswer()">Show Answer</button>
        </div>
    </div>

    <!-- Floating Trigger Config Button -->
    <button class="config-launcher" onclick="openConfigPanel()">
        ⚙️ Teacher Dashboard
    </button>

    <!-- Content Configuration Editor Modal -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeConfigPanel()">&times;</span>
            <h2>Game Content Configuration</h2>
            
            <div id="panelFormGroup" class="panel-columns">
                <!-- Javascript maps editing columns here dynamically -->
            </div>

            <div class="save-footer">
                <button class="action-btn" onclick="saveConfigData()">Apply changes & Reset Board</button>
            </div>
        </div>
    </div>

    <script>
        // Storage configuration for initial state data template
        let gameData = [
            {
                category: "Algebra",
                clues: [
                    { value: 100, q: "Solve for x: 2x + 5 = 15", a: "x = 5" },
                    { value: 200, q: "What is the slope of the line y = -3x + 7?", a: "-3" },
                    { value: 300, q: "Factor completely: x² - 9", a: "(x + 3)(x - 3)" },
                    { value: 400, q: "Solve for y: 3(y - 2) = 12", a: "y = 6" }
                ]
            },
            {
                category: "Geometry",
                clues: [
                    { value: 100, q: "How many degrees are in a straight angle?", a: "180 degrees" },
                    { value: 200, q: "Find the area of a triangle with base 6cm and height 4cm.", a: "12 cm²" },
                    { value: 300, q: "What is the geometric term for a regular 8-sided polygon?", a: "Octagon" },
                    { value: 400, q: "State the Pythagorean theorem formula.", a: "a² + b² = c²" }
                ]
            },
            {
                category: "Fractions",
                clues: [
                    { value: 100, q: "Simplify the fraction 8/12 to its lowest terms.", a: "2/3" },
                    { value: 200, q: "What is 3/4 multiplied by 2/3?", a: "6/12 or 1/2" },
                    { value: 300, q: "Convert 2.75 into a mixed fraction.", a: "2 ¾" },
                    { value: 400, q: "Which fraction is larger: 5/8 or 7/12?", a: "5/8 (0.625 vs 0.583)" }
                ]
            },
            {
                category: "Word Problems",
                clues: [
                    { value: 100, q: "Sam bought 4 notebooks for $3 each. He paid with a $20 bill. How much change did he get?", a: "$8" },
                    { value: 200, q: "A train travels at 60 mph. How long will it take to cover 210 miles?", a: "3.5 hours" },
                    { value: 300, q: "The sum of three consecutive integers is 45. What is the smallest integer?", a: "14 (14, 15, 16)" },
                    { value: 400, q: "A shoe store offers a 20% discount on a $80 pair of shoes. What is the sale price?", a: "$64" }
                ]
            }
        ];

        let currentAnswer = "";

        // Build main interactive grid board view
        function initBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = ""; // Complete wipe for safe re-render calls
            
            // Build visual text category labels header row
            gameData.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = cat.category;
                board.appendChild(header);
            });

            // Parse structural column rows sorted strictly by numerical target values
            const numRows = gameData[0].clues.length;
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < gameData.length; c++) {
                    const clue = gameData[c].clues[r];
                    const card = document.createElement('div');
                    card.className = 'clue-card';
                    card.innerText = `$${clue.value}`;
                    card.onclick = function() {
                        if (!card.classList.contains('viewed')) {
                            card.classList.add('viewed');
                            showClue(clue.q, clue.a);
                        }
                    };
                    board.appendChild(card);
                }
            }
        }

        function showClue(question, answer) {
            currentAnswer = answer;
            document.getElementById('modalText').innerText = question;
            document.getElementById('revealBtn').style.display = 'inline-block';
            document.getElementById('clueModal').style.display = 'flex';
        }

        function revealAnswer() {
            document.getElementById('modalText').innerText = currentAnswer;
            document.getElementById('revealBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('clueModal').style.display = 'none';
        }

        function changeScore(id, amt) {
            const scoreEl = document.getElementById(id);
            scoreEl.innerText = parseInt(scoreEl.innerText) + amt;
        }

        // Generate form fields inside the Configuration Manager panel dynamically
        function openConfigPanel() {
            const container = document.getElementById('panelFormGroup');
            container.innerHTML = ""; // Clear old nodes out safely
            
            gameData.forEach((catObj, catIdx) => {
                const colNode = document.createElement('div');
                colNode.className = 'panel-column';
                
                // Head Category Input Text Box
                colNode.innerHTML = `
                    <input type="text" class="column-title-input" id="cfg-cat-${catIdx}" value="${catObj.category}">
                `;
                
                // Run mapping down values arrays inside current Category
                catObj.clues.forEach((clueObj, clueIdx) => {
                    const editBlock = document.createElement('div');
                    editBlock.className = 'clue-edit-block';
                    editBlock.innerHTML = `
                        <div class="clue-val-label">$${clueObj.value}</div>
                        <input type="text" class="panel-input" id="cfg-q-${catIdx}-${clueIdx}" placeholder="Question text" value="${clueObj.q.replace(/"/g, '&quot;')}">
                        <input type="text" class="panel-input" id="cfg-a-${catIdx}-${clueIdx}" placeholder="Answer description" value="${clueObj.a.replace(/"/g, '&quot;')}">
                    `;
                    colNode.appendChild(editBlock);
                });
                
                container.appendChild(colNode);
            });
            
            document.getElementById('configModal').style.display = 'flex';
        }

        function closeConfigPanel() {
            document.getElementById('configModal').style.display = 'none';
        }

        // Grab form strings array, reconstruct gameData array structure, updates layout grid
        function saveConfigData() {
            gameData.forEach((catObj, catIdx) => {
                const newCatName = document.getElementById(`cfg-cat-${catIdx}`).value;
                if(newCatName.trim() !== "") {
                    catObj.category = newCatName;
                }
                
                catObj.clues.forEach((clueObj, clueIdx) => {
                    const questionVal = document.getElementById(`cfg-q-${catIdx}-${clueIdx}`).value;
                    const answerVal = document.getElementById(`cfg-a-${catIdx}-${clueIdx}`).value;
                    
                    clueObj.q = questionVal;
                    clueObj.a = answerVal;
                });
            });
            
            initBoard(); // Force rebuild matrix values graphics elements
            closeConfigPanel();
        }

        window.onload = initBoard;
    </script>
</body>
</html>
