<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Feud</title>
    <link rel="icon" type="image/png" href="DARWIN.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f1b811;
            --gold-light: #ffe08a;
            --gold-dark: #b38600;
            --blue-dark: #051026;
            --blue-medium: #0a1f44;
            --blue-light: #1a3a6d;
            --danger: #ff4757;
            --success: #2ed573;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, var(--blue-medium), var(--blue-dark));
            color: #f1f2f6;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1, h2, h3 { 
            font-family: 'Bebas Neue', sans-serif; 
            letter-spacing: 2px; 
            color: var(--gold);
            margin-top: 0;
        }

        /* Container Layout */
        .master-container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        /* Elegant Cards */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        .launcher-zone {
            grid-column: span 2;
            background: linear-gradient(90deg, var(--blue-light), var(--blue-medium));
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
            animation: slideDown 0.5s ease;
        }

        /* Modern Inputs */
        label { font-size: 0.85rem; font-weight: 600; color: var(--gold-light); text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, select {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; font-family: 'Poppins'; margin-bottom: 15px;
        }

        /* Elegant Buttons */
        button {
            font-family: 'Poppins';
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-gold {
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            color: var(--blue-dark);
            box-shadow: 0 4px 15px rgba(241, 184, 17, 0.3);
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(241, 184, 17, 0.5); }
        .btn-gold:active { transform: translateY(0); }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: white; }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { filter: brightness(1.2); box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); }

        /* Scoring & Multipliers */
        .score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .score-box {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: center;
            border: 2px solid transparent; cursor: pointer; transition: var(--transition);
        }
        .score-box.active-team { border-color: var(--gold); background: rgba(241, 184, 17, 0.1); }
        .score-num { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--gold); }

        .multiplier-group { display: flex; gap: 5px; margin-bottom: 20px; }
        .mult-btn { flex: 1; font-size: 0.7rem; padding: 8px; background: rgba(255,255,255,0.1); }
        .mult-btn.active { background: var(--gold); color: var(--blue-dark); }

        /* Question Bank List */
        .bank-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2); padding: 12px 18px; border-radius: 15px; margin-bottom: 10px;
            border-left: 4px solid transparent; transition: var(--transition);
        }
        .bank-item:hover { background: rgba(255,255,255,0.05); }
        .bank-item.active-q { border-left-color: var(--success); background: rgba(46, 213, 115, 0.1); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="teacher-view">
        <div class="launcher-zone">
            <h1>Math Feud Controller</h1>
            <button onclick="openProjectorWindow()" class="btn-gold" style="font-size: 1.2rem; padding: 15px 40px;">Launch Projector Window</button>
        </div>

        <div class="master-container">
            <div class="panel">
                <h2>Game Controls</h2>
                
                <label>Teams</label>
                <select id="team-count" onchange="initTeams()">
                    <option value="2">2 Teams</option>
                    <option value="3">3 Teams</option>
                    <option value="4">4 Teams</option>
                </select>
                
                <div id="team-name-inputs"></div>
                <button onclick="saveTeamNames()" class="btn-outline" style="width:100%; margin-bottom:20px;">Update Names</button>

                <label>Point Multiplier</label>
                <div class="multiplier-group">
                    <button id="m1-btn" class="mult-btn active" onclick="setMultiplier(1)">x1</button>
                    <button id="m2-btn" class="mult-btn" onclick="setMultiplier(2)">x2</button>
                    <button id="m3-btn" class="mult-btn" onclick="setMultiplier(3)">x3</button>
                </div>

                <label>Live Score (Click Team to Target)</label>
                <div class="score-grid" id="control-score-grid"></div>

                <button onclick="adjustStrikes(1)" class="btn-danger" style="width:100%; font-size:1.1rem;">ADD STRIKE (X)</button>
                <button onclick="adjustStrikes(0)" class="btn-outline" style="width:100%; margin-top:10px;">Clear Strikes</button>
            </div>

            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Question Bank</h2>
                    <p style="font-size: 0.8rem; color: #aaa;">Click 'Push' to update board</p>
                </div>
                
                <div id="question-bank-list" style="margin-bottom: 30px;"></div>

                <h3 style="border-top: 1px solid var(--glass); padding-top: 20px;">Create New Question</h3>
                <label>Question Prompt</label>
                <input type="text" id="edit-q-text" placeholder="e.g. Name a Prime Number...">
                
                <label>Answers & Base Points</label>
                <div id="edit-answers-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                <button onclick="addQuestionToBank()" class="btn-gold" style="width:100%; margin-top:15px;">Save to Bank</button>
            </div>
        </div>
    </div>

    <div id="projector-view" style="display:none;">
        <style>
            .proj-body {
                background: radial-gradient(circle at center, #0a1f44 0%, #020611 100%);
                color: white; margin: 0; padding: 40px; height: 100vh; display: flex; flex-direction: column;
                font-family: 'Poppins', sans-serif; overflow: hidden;
            }
            .proj-header { 
                font-family: 'Bebas Neue'; font-size: 5rem; text-align: center; color: var(--gold);
                text-shadow: 0 0 20px rgba(241,184,17,0.5); margin: 0;
            }
            
            /* Team Score Cards */
            .proj-score-row { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
            .proj-card {
                background: rgba(255,255,255,0.05); border: 3px solid rgba(255,255,255,0.2);
                border-radius: 20px; padding: 20px 40px; min-width: 220px; text-align: center;
                transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .proj-card.active { border-color: var(--gold); background: rgba(241,184,17,0.1); transform: scale(1.1); box-shadow: 0 0 40px rgba(241,184,17,0.3); }
            .proj-name { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 2px; }
            .proj-score { font-family: 'Bebas Neue'; font-size: 4.5rem; color: var(--gold); }

            /* Board */
            .proj-board {
                flex-grow: 1; background: rgba(0,0,0,0.4); border: 8px double var(--gold);
                border-radius: 40px; padding: 30px; display: flex; flex-direction: column;
                box-shadow: inset 0 0 50px #000;
            }
            .proj-question {
                font-size: 2.8rem; font-weight: 700; text-align: center; margin-bottom: 30px;
                color: white; text-shadow: 2px 2px 10px #000;
                animation: fadeIn 0.8s ease;
            }
            
            .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            
            /* Flip Card Styling */
            .flip-container { perspective: 1000px; height: 85px; }
            .flip-card { 
                width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
                transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .flip-card.open { transform: rotateX(180deg); }
            .face { 
                position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
                border-radius: 15px; border: 4px solid white; display: flex; align-items: center;
                padding: 0 25px; box-sizing: border-box; font-family: 'Bebas Neue';
            }
            .front { background: linear-gradient(135deg, #1e3799, #0c2461); justify-content: center; }
            .back { 
                background: linear-gradient(135deg, #079992, #006266); transform: rotateX(180deg); 
                justify-content: space-between; border-color: var(--gold);
            }
            .f-num { background: var(--gold); color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
            .f-text { font-size: 2.2rem; }
            .f-pts { background: white; color: black; padding: 5px 15px; border-radius: 8px; font-size: 2.2rem; }

            /* Strike Animations */
            .strike-zone { text-align: center; font-size: 7rem; color: var(--danger); height: 120px; text-shadow: 0 0 30px #ff0000; }
            .strike-anim { animation: strikeBoom 0.5s ease; }

            .multiplier-badge {
                position: absolute; top: 30px; right: 30px; background: var(--danger);
                color: white; padding: 10px 20px; border-radius: 50px; font-weight: 700;
                border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            }

            @keyframes strikeBoom { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.5); } 100% { transform: scale(1); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
            
            .score-pop { animation: pop 0.4s ease; }
            @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: white; } 100% { transform: scale(1); } }
        </style>

        <div class="proj-body">
            <div id="proj-mult-badge" class="multiplier-badge">x1 POINTS</div>
            <h1 class="proj-header">Math Feud</h1>
            <div class="proj-score-row" id="proj-scores"></div>
            <div class="proj-board">
                <div class="proj-question" id="proj-q-text">Awaiting Teacher...</div>
                <div class="proj-grid" id="proj-grid"></div>
                <div class="strike-zone" id="proj-strikes"></div>
            </div>
        </div>
    </div>

    <script>
        /* CORE LOGIC */
        let questionBank = JSON.parse(localStorage.getItem('mathFeudBank')) || [
            {
                question: "Name a Prime Number below 20",
                answers: [{text: "2", pts: 40}, {text: "3", pts: 30}, {text: "5", pts: 20}, {text: "7", pts: 10}]
            }
        ];

        let gameState = {
            currentQuestion: "Welcome to Math Feud!",
            answers: [],
            strikes: 0,
            activeTeam: 0,
            multiplier: 1,
            teams: [{name: "Team 1", score: 0}, {name: "Team 2", score: 0}]
        };

        const urlParams = new URLSearchParams(window.location.search);
        const isProjector = urlParams.get('view') === 'projector';

        window.onload = function() {
            if (isProjector) {
                document.getElementById('teacher-view').remove();
                document.getElementById('projector-view').style.display = 'block';
                startProjector();
            } else {
                initTeams();
                renderAnswerInputs();
                renderBank();
                sync();
                window.addEventListener('storage', () => {
                    gameState = JSON.parse(localStorage.getItem('mathFeudState'));
                    updateUI();
                });
            }
        };

        /* TEACHER FUNCTIONS */
        function openProjectorWindow() {
            window.open(window.location.href + "?view=projector", "MathFeudProj", "width=1200,height=800");
        }

        function initTeams() {
            const count = document.getElementById('team-count').value;
            gameState.teams = Array.from({length: count}, (_, i) => ({
                name: gameState.teams[i]?.name || `Team ${i+1}`,
                score: gameState.teams[i]?.score || 0
            }));
            renderTeamInputs();
            sync();
            updateUI();
        }

        function renderTeamInputs() {
            const container = document.getElementById('team-name-inputs');
            container.innerHTML = gameState.teams.map((t, i) => `
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" value="${t.name}" onchange="updateTeamName(${i}, this.value)" style="margin:0;">
                    <button class="btn-outline" onclick="adjScore(${i}, 5)" style="padding:5px 10px;">+5</button>
                    <button class="btn-outline" onclick="adjScore(${i}, -5)" style="padding:5px 10px;">-5</button>
                </div>
            `).join('');
        }

        function updateTeamName(i, val) { gameState.teams[i].name = val; sync(); updateUI(); }

        function adjScore(i, amt) { 
            gameState.teams[i].score = Math.max(0, gameState.teams[i].score + amt); 
            sync(); updateUI(); 
        }

        function renderAnswerInputs() {
            document.getElementById('edit-answers-list').innerHTML = Array.from({length: 6}, (_, i) => `
                <input type="text" id="ans-${i}" placeholder="Answer ${i+1}">
                <input type="number" id="pts-${i}" placeholder="Pts">
            `).join('');
        }

        function addQuestionToBank() {
            const qText = document.getElementById('edit-q-text').value;
            let answers = [];
            for(let i=0; i<6; i++) {
                const text = document.getElementById(`ans-${i}`).value;
                const pts = parseInt(document.getElementById(`pts-${i}`).value);
                if(text && pts) answers.push({text, pts});
            }
            if(!qText || !answers.length) return alert("Fill in Question and at least 1 answer");
            questionBank.push({question: qText, answers});
            localStorage.setItem('mathFeudBank', JSON.stringify(questionBank));
            renderBank();
            document.getElementById('edit-q-text').value = '';
            renderAnswerInputs();
        }

        function renderBank() {
            document.getElementById('question-bank-list').innerHTML = questionBank.map((q, i) => `
                <div class="bank-item ${gameState.currentQuestion === q.question ? 'active-q' : ''}">
                    <div><strong>${q.question}</strong></div>
                    <div>
                        <button class="btn-gold" onclick="pushQ(${i})" style="padding:5px 10px; font-size:0.7rem;">PUSH</button>
                        <button class="btn-danger" onclick="delQ(${i})" style="padding:5px 10px; font-size:0.7rem;">DEL</button>
                    </div>
                </div>
            `).join('');
        }

        function delQ(i) { questionBank.splice(i,1); localStorage.setItem('mathFeudBank', JSON.stringify(questionBank)); renderBank(); }

        function pushQ(i) {
            gameState.currentQuestion = questionBank[i].question;
            gameState.answers = questionBank[i].answers.map(a => ({...a, open: false}));
            gameState.strikes = 0;
            sync(); updateUI(); renderBank();
        }

        function setMultiplier(m) {
            gameState.multiplier = m;
            document.querySelectorAll('.mult-btn').forEach((btn, i) => btn.classList.toggle('active', i+1 === m));
            sync(); updateUI();
        }

        function updateUI() {
            const grid = document.getElementById('control-score-grid');
            grid.innerHTML = gameState.teams.map((t, i) => `
                <div class="score-box ${gameState.activeTeam === i ? 'active-team' : ''}" onclick="setTarget(${i})">
                    <div style="font-size:0.7rem;">${t.name}</div>
                    <div class="score-num">${t.score}</div>
                </div>
            `).join('');

            let controlHtml = `<h3>Board Control</h3><p>${gameState.currentQuestion}</p>`;
            gameState.answers.forEach((a, i) => {
                controlHtml += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:5px;">
                        <span>${a.text} (${a.pts})</span>
                        <button class="${a.open ? 'btn-outline' : 'btn-gold'}" onclick="reveal(${i})">${a.open ? 'HIDDEN' : 'REVEAL'}</button>
                    </div>
                `;
            });
            const boardCtrl = document.getElementById('board-ctrl') || document.createElement('div');
            boardCtrl.id = 'board-ctrl';
            boardCtrl.innerHTML = controlHtml;
            document.querySelector('.master-container').appendChild(boardCtrl);
        }

        function setTarget(i) { gameState.activeTeam = i; sync(); updateUI(); }

        function reveal(i) {
            if(!gameState.answers[i].open) {
                gameState.answers[i].open = true;
                gameState.teams[gameState.activeTeam].score += (gameState.answers[i].pts * gameState.multiplier);
            } else {
                gameState.answers[i].open = false;
            }
            sync(); updateUI();
        }

        function adjustStrikes(amt) {
            if(amt === 0) gameState.strikes = 0;
            else if(gameState.strikes < 3) gameState.strikes++;
            sync(); updateUI();
        }

        function sync() { localStorage.setItem('mathFeudState', JSON.stringify(gameState)); }

        /* PROJECTOR FUNCTIONS */
        let lastScores = [];
        let lastStrikes = 0;

        function startProjector() {
            updateProjector();
            window.addEventListener('storage', updateProjector);
        }

        function updateProjector() {
            const state = JSON.parse(localStorage.getItem('mathFeudState'));
            if(!state) return;

            document.getElementById('proj-q-text').innerText = state.currentQuestion;
            document.getElementById('proj-mult-badge').innerText = `x${state.multiplier} POINTS`;

            // Scores
            const scoreContainer = document.getElementById('proj-scores');
            scoreContainer.innerHTML = state.teams.map((t, i) => {
                const pop = (lastScores[i] !== undefined && lastScores[i] !== t.score) ? 'score-pop' : '';
                return `
                    <div class="proj-card ${state.activeTeam === i ? 'active' : ''}">
                        <div class="proj-name">${t.name}</div>
                        <div class="proj-score ${pop}">${t.score}</div>
                    </div>
                `;
            }).join('');
            lastScores = state.teams.map(t => t.score);

            // Strikes
            const sTarget = document.getElementById('proj-strikes');
            let sHtml = '';
            for(let i=0; i<state.strikes; i++) sHtml += `<span class="strike-anim">X </span>`;
            sTarget.innerHTML = sHtml;

            // Board
            document.getElementById('proj-grid').innerHTML = state.answers.map((a, i) => `
                <div class="flip-container">
                    <div class="flip-card ${a.open ? 'open' : ''}">
                        <div class="face front"><div class="f-num">${i+1}</div></div>
                        <div class="face back">
                            <div class="f-text">${a.text}</div>
                            <div class="f-pts">${a.pts * state.multiplier}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
