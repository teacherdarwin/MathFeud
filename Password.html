<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Challenge</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-emerald: #10b981;
            --accent-crimson: #ef4444;
            --text-main: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .game-container { background: var(--card-dark); border: 2px solid #334155; padding: 40px; border-radius: 20px; text-align: center; max-width: 600px; width: 100%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-bottom: 30px; }
        
        .timer-circle { width: 120px; height: 120px; border-radius: 50%; border: 6px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; margin: 0 auto 30px; color: #38bdf8; position: relative; }
        .timer-circle.warning { border-color: var(--accent-crimson); color: var(--accent-crimson); animation: pulse 1s infinite; }
        
        .word-display { font-size: 3.5rem; font-weight: 800; color: #f59e0b; margin-bottom: 40px; min-height: 100px; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; }
        
        .controls { display: flex; justify-content: center; gap: 15px; }
        button { border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; }
        .btn-start { background: #38bdf8; color: #0f172a; width: 100%; }
        .btn-correct { background: var(--accent-emerald); color: white; display: none; flex-grow: 1; }
        .btn-skip { background: #475569; color: white; display: none; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Password Vocabulary</h1>
        
        <div class="timer-circle" id="timerBox">60</div>
        
        <div class="word-display" id="wordBox">READY?</div>
        
        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="btn-skip" id="skipBtn" onclick="nextWord()">Skip</button>
            <button class="btn-correct" id="correctBtn" onclick="markCorrect()">Correct!</button>
        </div>
    </div>

    <script>
        // CONFIGURATION: Simply drop your target review vocabulary array here!
        const wordPool = [
            "HYPOTENUSE", "PARALLEL", "COEFFICIENT", "EQUATION", 
            "FRACTION", "VARIABLE", "RADIUS", "EXPONENT", 
            "POLYGON", "PERIMETER", "SYMMETRY", "DENOMINATOR"
        ];

        let words = [];
        let currentIndex = 0;
        let timer = null;
        let timeLeft = 60;
        let score = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame() {
            words = shuffle([...wordPool]);
            currentIndex = 0;
            timeLeft = 60;
            score = 0;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('skipBtn').style.display = 'inline-block';
            document.getElementById('correctBtn').style.display = 'inline-block';
            
            displayWord();
            startTimer();
        }

        function displayWord() {
            if (currentIndex < words.length) {
                document.getElementById('wordBox').innerText = words[currentIndex];
            } else {
                endGame(true);
            }
        }

        function startTimer() {
            clearInterval(timer);
            const timerBox = document.getElementById('timerBox');
            timerBox.className = "timer-circle";
            
            timer = setInterval(() => {
                timeLeft--;
                timerBox.innerText = timeLeft;
                
                if (timeLeft <= 10) {
                    timerBox.classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function markCorrect() {
            score++;
            currentIndex++;
            displayWord();
        }

        function nextWord() {
            currentIndex++;
            displayWord();
        }

        function endGame(clearedAll) {
            clearInterval(timer);
            document.getElementById('timerBox').innerText = "0";
            document.getElementById('wordBox').innerText = clearedAll ? `Perfect Clear! Score: ${score}` : `Time's Up! Score: ${score}`;
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').innerText = 'Play Again';
            document.getElementById('skipBtn').style.display = 'none';
            document.getElementById('correctBtn').style.display = 'none';
        }
    </script>
</body>
</html>
